name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - run: bun run check
      - run: bun run typecheck
      - run: bun test

      - run: bun run build

      - run: npm publish --provenance --access public

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update CHANGELOG.md
        run: |
          TAG="${{ github.ref_name }}"
          DATE=$(date -u +%Y-%m-%d)
          NOTES=$(gh release view "$TAG" --json body --jq .body)

          ENTRY="## ${TAG} (${DATE})

          ${NOTES}"

          if [ -f CHANGELOG.md ]; then
            # Insert after the first line (# Changelog)
            EXISTING=$(tail -n +2 CHANGELOG.md)
            printf '# Changelog\n\n%s\n%s\n' "$ENTRY" "$EXISTING" > CHANGELOG.md
          else
            printf '# Changelog\n\n%s\n' "$ENTRY" > CHANGELOG.md
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:main
